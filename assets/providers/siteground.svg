  <text x="46" y="56" text-anchor="middle" font-size="28" font-weight="800" font-family="Arial, Helvetica, sans-serif" fill="#ffffff">SG</text>
  <text x="96" y="46" font-size="22" font-weight="800" font-family="Arial, Helvetica, sans-serif" fill="#0f172a">SiteGround</text>
  <text x="96" y="68" font-size="11" font-weight="700" font-family="Arial, Helvetica, sans-serif" fill="#64748b">web hosting</text>
