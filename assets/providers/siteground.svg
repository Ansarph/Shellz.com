  <desc id="desc">A clean wordmark badge for SiteGround</desc>
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
  </defs>
  <rect x="1" y="1" width="238" height="94" rx="22" fill="#ffffff" stroke="#dbe4f0" stroke-width="2"/>
